<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HMB Engineering — Wire Mesh Enquiry</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C8A84B;--green:#1A3D2B;--green2:#1e4d35;
  --cream:#FDF9F0;--cream2:#F5F0E4;
  --text:#1a1a1a;--text2:#555;
  --border:rgba(200,168,75,0.28);
  --red:#c0392b;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh}
.page{background:var(--cream);background-image:radial-gradient(ellipse at 20% 0%,rgba(26,61,43,0.06) 0%,transparent 55%);min-height:100vh;padding-bottom:60px}

/* HEADER */
.header{background:var(--green);padding:20px 16px 16px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(200,168,75,0.04) 18px,rgba(200,168,75,0.04) 19px)}
.hinner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.hlogo{width:58px;height:58px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;flex-shrink:0}
.hco{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--gold);line-height:1.1}
.hsub{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px}
.htag{font-size:9px;color:var(--gold);opacity:0.65;letter-spacing:0.14em;text-transform:uppercase;margin-top:4px}

/* PROGRESS */
.pbar{background:var(--green);padding:0 16px 14px}
.psteps{display:flex;align-items:center;max-width:360px;margin:0 auto}
.pitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.pcircle{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(200,168,75,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:rgba(255,255,255,0.35);transition:all .3s}
.pcircle.act{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,0.12)}
.pcircle.done{border-color:var(--gold);background:var(--gold);color:var(--green)}
.plabel{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:.07em;text-transform:uppercase;text-align:center}
.plabel.act{color:rgba(200,168,75,0.8)}
.pline{flex:1;height:1px;background:rgba(200,168,75,0.18);margin:0 3px;margin-bottom:14px}

/* WRAP */
.wrap{max-width:580px;margin:0 auto;padding:20px 14px 0}

/* CARD */
.card{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:0 3px 18px rgba(26,61,43,0.08);overflow:hidden;margin-bottom:14px}
.cardh{background:var(--green);padding:12px 18px;display:flex;align-items:center;gap:10px}
.cardico{width:30px;height:30px;border-radius:7px;background:rgba(200,168,75,0.14);border:1px solid rgba(200,168,75,0.28);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cardico svg{width:15px;height:15px}
.cardt{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold);letter-spacing:.02em}
.cardb{padding:16px 18px}

/* FORM */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row1{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px}
@media(max-width:460px){.row2{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.05em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{padding:9px 11px;font-size:14px;font-family:'DM Sans',sans-serif;border:1px solid #e0d9c8;border-radius:8px;background:var(--cream);color:var(--text);outline:none;width:100%;transition:border .2s,box-shadow .2s}
.fg input:focus,.fg select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,168,75,0.1)}
.fg input.err,.fg select.err{border-color:var(--red)}
.hint{font-size:10px;color:#aaa;margin-top:2px}
.req{color:var(--gold)}

/* WEAVE TOGGLE */
.wtog{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.wbtn{padding:9px 6px;border:1.5px solid #e0d9c8;border-radius:8px;background:var(--cream);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);text-align:center;line-height:1.3;transition:all .2s}
.wbtn.sel{border-color:var(--gold);background:rgba(200,168,75,0.08);color:var(--green);font-weight:500}
.wbtn small{display:block;font-size:10px;color:#bbb;margin-top:1px}
.wbtn.sel small{color:var(--gold)}

/* ITEM CARDS */
.item-card{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 2px 12px rgba(26,61,43,0.06);margin-bottom:12px;overflow:hidden}
.item-card-head{background:var(--green);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.item-card-title{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);font-weight:600}
.item-del-btn{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.4);color:#ff8a7a;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.item-del-btn:hover{background:rgba(192,57,43,0.3)}
.item-body{padding:14px 16px}
.live-wt{background:var(--cream2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:10px;display:none}
.live-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
@media(max-width:460px){.live-row{grid-template-columns:1fr 1fr}}
.live-tile{background:#fff;border-radius:6px;padding:7px 8px;border:1px solid var(--border)}
.live-tile.hl{background:var(--green)}
.live-label{font-size:9px;color:#aaa;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.live-tile.hl .live-label{color:rgba(200,168,75,0.65)}
.live-val{font-size:13px;font-weight:500;color:var(--text)}
.live-tile.hl .live-val{color:var(--gold)}
.live-unit{font-size:10px;color:#bbb;font-weight:400}

/* ADD ITEM BTN */
.add-btn{width:100%;padding:12px;border:1.5px dashed var(--gold);border-radius:10px;background:rgba(200,168,75,0.05);color:var(--green);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:14px}
.add-btn:hover{background:rgba(200,168,75,0.12);border-style:solid}

/* NAV BTNS */
.navrow{display:flex;gap:10px;margin-top:16px}
.btn-next{flex:1;padding:12px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;background:var(--green);color:var(--gold);border:1.5px solid var(--gold);border-radius:9px;cursor:pointer;transition:all .2s}
.btn-next:hover{background:var(--gold);color:var(--green)}
.btn-back{padding:12px 16px;font-size:14px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text2);border:1px solid #ddd;border-radius:9px;cursor:pointer;transition:all .2s}
.btn-back:hover{border-color:#aaa}

/* STEP SECTIONS */
.step{display:none}.step.act{display:block}

/* SUMMARY */
.sum-item{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.sum-item-head{background:var(--green);padding:9px 14px;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);font-weight:600}
.sum-table{width:100%;font-size:12px;border-collapse:collapse}
.sum-table td{padding:6px 10px;border-bottom:.5px solid #f0ebe0}
.sum-table td:first-child{color:#888;width:46%}
.sum-table td:last-child{font-weight:500;color:var(--text)}
.sum-table tr:last-child td{border-bottom:none}
.approx-badge{display:inline-block;background:#fffbf2;border:1px solid #e8d98a;color:#7a6a20;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500}

/* SUCCESS */
.success{display:none;text-align:center;padding:36px 16px}
.sico{width:68px;height:68px;border-radius:50%;background:var(--green);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.sico svg{width:30px;height:30px}
.stitle{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--green);font-weight:600;margin-bottom:8px}
.ssub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.pdf-all-btn{padding:12px 24px;background:var(--green);color:var(--gold);border:1.5px solid var(--gold);border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin:4px;transition:all .2s}
.pdf-all-btn:hover{background:var(--gold);color:var(--green)}
.wa-btn{padding:11px 20px;background:#25D366;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin:4px}
.pdf-item-list{margin-top:16px;display:flex;flex-direction:column;gap:8px;align-items:center}
.pdf-one-btn{padding:9px 20px;background:#fff;color:var(--green);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;max-width:360px;transition:all .2s}
.pdf-one-btn:hover{border-color:var(--gold);background:var(--cream)}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,61,43,0.85);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.overlay.show{display:flex}
.spin{width:42px;height:42px;border:3px solid rgba(200,168,75,0.3);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ovtxt{color:var(--gold);font-size:14px;font-family:'Cormorant Garamond',serif;letter-spacing:.05em}

/* APPROX NOTE */
.anote{background:#fffbf2;border:1px solid #e8d98a;border-radius:7px;padding:9px 12px;font-size:11px;color:#7a6a20;line-height:1.6;margin-top:10px;display:flex;gap:7px;align-items:flex-start}
.anote svg{flex-shrink:0;margin-top:1px}
</style>
</head>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJQmMG2fuIOyG6C9hSOoSmldvdqCkPcjKvq5gQr5PAxjK3dqInLpdJQ-6do_8TktvK_A/exec';
const HMB_WA = '919311299006';

const DENSITY = {
  'Mild Steel (MS)':7.85,'Spring Steel':7.85,
  'Stainless Steel 304':7.93,'Stainless Steel 316':7.98,
  'Galvanised Iron (GI)':7.85,'Manganese Steel':7.8,'Copper':8.96
};
const WF = {'Plain Weave':1.0,'Double Crimped':1.15};

let itemCount = 0;
let submittedData = {};

// ── HELPERS ──
function gv(id){return(document.getElementById(id)||{}).value||'';}
function gn(id){return parseFloat(gv(id))||0;}
function qs(id){return document.getElementById(id);}

// ── STEP NAV ──
function goStep(n){
  if(n>1 && !validateStep(n-1)) return;
  ['step1','step2','step3'].forEach((s,i)=>qs(s).classList.toggle('act',i+1===n));
  for(let i=1;i<=3;i++){
    const c=qs('pc'+i),l=qs('pl'+i);
    if(i<n){c.className='pcircle done';c.innerHTML='✓';l.className='plabel';}
    else if(i===n){c.className='pcircle act';c.textContent=i;l.className='plabel act';}
    else{c.className='pcircle';c.textContent=i;l.className='plabel';}
  }
  if(n===2 && itemCount===0) addItem();
  if(n===3) buildReview();
  window.scrollTo({top:0,behavior:'smooth'});
}

function validateStep(n){
  if(n===1){
    if(!gv('cName').trim()){alert('Full name is required');qs('cName').focus();return false;}
    if(!gv('cMobile').trim()){alert('Mobile number is required');qs('cMobile').focus();return false;}
  }
  if(n===2){
    const cards=document.querySelectorAll('.item-card');
    if(cards.length===0){alert('Please add at least one item');return false;}
    for(let i=0;i<cards.length;i++){
      const id=cards[i].dataset.itemId;
      if(!getItemVal(id,'moc')){alert(`Item ${i+1}: Please select material`);return false;}
      if(!getItemVal(id,'weave')){alert(`Item ${i+1}: Please select weaving pattern`);return false;}
      if(!parseFloat(getItemVal(id,'aperture'))){alert(`Item ${i+1}: Please enter aperture size`);return false;}
      if(!parseFloat(getItemVal(id,'wiredia'))){alert(`Item ${i+1}: Please enter wire diameter`);return false;}
      if(!parseFloat(getItemVal(id,'width'))){alert(`Item ${i+1}: Please enter width`);return false;}
      if(!parseFloat(getItemVal(id,'length'))){alert(`Item ${i+1}: Please enter length`);return false;}
    }
  }
  return true;
}

// ── ITEM MANAGEMENT ──
function addItem(){
  itemCount++;
  const id='item'+itemCount;
  const n=itemCount;
  const div=document.createElement('div');
  div.className='item-card'; div.dataset.itemId=id;
  div.innerHTML=`
    <div class="item-card-head">
      <div class="item-card-title">Item ${n}</div>
      ${n>1?`<button class="item-del-btn" onclick="removeItem('${id}')">✕ Remove</button>`:''}
    </div>
    <div class="item-body">
      <div class="row2">
        <div class="fg">
          <label>Material (MOC) <span class="req">*</span></label>
          <select id="${id}_moc">
            <option value="">— Select —</option>
            <option>Mild Steel (MS)</option>
            <option>Spring Steel</option>
            <option>Stainless Steel 304</option>
            <option>Stainless Steel 316</option>
            <option>Galvanised Iron (GI)</option>
            <option>Manganese Steel</option>
            <option>Copper</option>
          </select>
        </div>
        <div class="fg">
          <label>Quantity (pcs) <span class="req">*</span></label>
          <input type="number" id="${id}_qty" value="1" min="1" oninput="calcItem('${id}')">

function removeItem(id){
  const el=document.querySelector(`.item-card[data-item-id="${id}"]`);
  if(el) el.remove();
  renumberItems();
}

function renumberItems(){
  const cards=document.querySelectorAll('.item-card');
  cards.forEach((c,i)=>{
    c.querySelector('.item-card-title').textContent=`Item ${i+1}`;
  });
}

function getItemVal(id,field){return(qs(id+'_'+field)||{}).value||'';}
function getItemNum(id,field){return parseFloat(getItemVal(id,field))||0;}

function selectWeave(id,val){
  qs(id+'_weave').value=val;
  qs(id+'_wPlain').classList.toggle('sel',val==='Plain Weave');
  qs(id+'_wCrimped').classList.toggle('sel',val==='Double Crimped');
  calcItem(id);
}

function calcItem(id){
  const ap=getItemNum(id,'aperture'), wd=getItemNum(id,'wiredia');
  const W=getItemNum(id,'width'), L=getItemNum(id,'length');
  const moc=getItemVal(id,'moc'), weave=getItemVal(id,'weave');
  const qty=getItemNum(id,'qty')||1;
  const clamp=getItemVal(id,'clamp'), ca=getItemNum(id,'clampAdd')||60;
  const live=qs(id+'_live');
  if(!ap||!wd||!W||!L||!moc||!weave){live.style.display='none';return;}
  const density=DENSITY[moc]||7.85, wf=WF[weave]||1.0;
  let cW=W,cL=L;
  if(clamp==='width') cW=W+ca;
  else if(clamp==='length') cL=L+ca;
  else if(clamp==='both'){cW=W+ca;cL=L+ca;}
  const pitch=ap+wd;
  const nW=Math.ceil(cW/pitch)+1, nL=Math.ceil(cL/pitch)+1;
  const vol=(nW*(cL/1000)+nL*(cW/1000))*wf*Math.PI*Math.pow((wd/2)/1000,2);
  const wt=vol*density*1000;
  const oa=((ap/pitch)*(ap/pitch)*100).toFixed(1);
  live.style.display='block';
  qs(id+'_tiles').innerHTML=`
    <div class="live-tile hl"><div class="live-label">Approx. wt/pc</div><div class="live-val">${wt.toFixed(2)}<span class="live-unit"> kg</span></div></div>
    <div class="live-tile"><div class="live-label">Total (${qty}pcs)</div><div class="live-val">${(wt*qty).toFixed(2)}<span class="live-unit"> kg</span></div></div>
    <div class="live-tile"><div class="live-label">Pitch</div><div class="live-val">${pitch}<span class="live-unit"> mm</span></div></div>
    <div class="live-tile"><div class="live-label">% Open area</div><div class="live-val">${oa}<span class="live-unit"> %</span></div></div>`;
  // store calc results on element
  live.dataset.wt=wt.toFixed(2);
  live.dataset.total=(wt*qty).toFixed(2);
  live.dataset.oa=oa;
  live.dataset.pitch=pitch;
  live.dataset.cw=cW; live.dataset.cl=cL;
}

function submitForm(){
  if(!qs('consent').checked){alert('Please agree to be contacted before submitting.');return;}
  const cards=document.querySelectorAll('.item-card');
  const items=[];
  cards.forEach((c,i)=>{
    const id=c.dataset.itemId;
    const live=qs(id+'_live');
    items.push({
      item_no:i+1,
      moc:getItemVal(id,'moc'), weave:getItemVal(id,'weave'),
      aperture:getItemVal(id,'aperture'), wiredia:getItemVal(id,'wiredia'),
      width:getItemVal(id,'width'), length:getItemVal(id,'length'),
      clamp:getItemVal(id,'clamp'), clampAdd:getItemVal(id,'clampAdd'),
      qty:getItemVal(id,'qty'), notes:getItemVal(id,'notes'),
      pitch:live.dataset.pitch||'', oa:live.dataset.oa||'',
      wt_pc:live.dataset.wt||'', wt_total:live.dataset.total||'',
      calcW:live.dataset.cw||'', calcL:live.dataset.cl||''
    });
  });
  submittedData={
    timestamp:new Date().toLocaleString('en-IN'),
    name:gv('cName'), company:gv('cCompany'),
    mobile:gv('cMobile'), email:gv('cEmail'),
    city:gv('cCity'), delivery:gv('cDelivery'),
    items
  };
  qs('overlay').classList.add('show');
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(submittedData)})
    .then(()=>{qs('overlay').classList.remove('show');showSuccess();})
    .catch(()=>{qs('overlay').classList.remove('show');showSuccess();});
}

  ['step1','step2','step3'].forEach(s=>qs(s).style.display='none');
  qs('successScreen').style.display='block';
  qs('successMsg').innerHTML=`Thank you, <strong>${submittedData.name}</strong>! Your enquiry with <strong>${submittedData.items.length} item(s)</strong> has been received.<br>Sumit ji will contact you on <strong>${submittedData.mobile}</strong> shortly.`;
  // Individual PDF buttons
  let btns='<div style="font-size:11px;color:#aaa;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase">Individual spec sheets</div>';

// ── PDF ──
function makeWeaveSVG(weave, ap, wd){
  ap=parseFloat(ap); wd=parseFloat(wd);
  const pitch=ap+wd, cols=4, rows=4, cell=44;
  const wdPx=Math.max(6,Math.round((wd/pitch)*cell)), apPx=cell-wdPx;
  const W=cols*cell+20, H=rows*cell+20;
  const isCrimped=weave==='Double Crimped';
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect width="${W}" height="${H}" fill="#f8f4ea" rx="6"/>`;
  if(!isCrimped){
    for(let c=0;c<cols;c++){for(let r=0;r<rows;r++){
      const x=10+c*cell,y=10+r*cell,over=(c+r)%2===0;
      if(!over) svg+=`<rect x="${x}" y="${y}" width="${wdPx}" height="${cell}" fill="#8B6914" rx="2"/>`;
    }}
    for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
      const x=10+c*cell,y=10+r*cell,over=(c+r)%2===0;
      if(over) svg+=`<rect x="${x-2}" y="${y}" width="${cell+4}" height="${wdPx}" fill="#C8A84B" rx="2"/>`;
      else svg+=`<rect x="${x}" y="${y}" width="${apPx}" height="${wdPx}" fill="#C8A84B" opacity="0.4" rx="2"/>`;
    }}
    for(let c=0;c<cols;c++){for(let r=0;r<rows;r++){
      const x=10+c*cell,y=10+r*cell,over=(c+r)%2===0;
      if(over) svg+=`<rect x="${x}" y="${y}" width="${wdPx}" height="${cell}" fill="#8B6914" rx="2"/>`;
    }}
  } else {
    const crH=wdPx*0.8;
    for(let c=0;c<cols;c++){
      const x=10+c*cell+wdPx/2, off=(c%2===0)?0:crH/2;
      let p=`M ${x} ${10+off}`;
      for(let s=0;s<rows*2;s++){const sh=cell/2,xb=((s+c)%2===0)?wdPx/2:-wdPx/2;p+=` Q ${x+xb} ${10+off+s*sh+sh/2} ${x} ${10+off+(s+1)*sh}`;}
      svg+=`<path d="${p}" fill="none" stroke="#8B6914" stroke-width="${wdPx}" stroke-linecap="round"/>`;
    }
    for(let r=0;r<rows;r++){
      const y=10+r*cell+wdPx/2, off=(r%2===0)?0:crH/2;
      let p=`M ${10+off} ${y}`;
      for(let s=0;s<cols*2;s++){const sw=cell/2,yb=((s+r)%2===0)?wdPx/2:-wdPx/2;p+=` Q ${10+off+s*sw+sw/2} ${y+yb} ${10+off+(s+1)*sw} ${y}`;}
      svg+=`<path d="${p}" fill="none" stroke="#C8A84B" stroke-width="${wdPx}" stroke-linecap="round"/>`;
    }
  }
  const ax=10,ay=H-8;
  svg+=`<line x1="${ax}" y1="${ay}" x2="${ax+apPx}" y2="${ay}" stroke="#1A3D2B" stroke-width="1"/>`;
  svg+=`<line x1="${ax}" y1="${ay-3}" x2="${ax}" y2="${ay+3}" stroke="#1A3D2B" stroke-width="1"/>`;
  svg+=`<line x1="${ax+apPx}" y1="${ay-3}" x2="${ax+apPx}" y2="${ay+3}" stroke="#1A3D2B" stroke-width="1"/>`;
  svg+=`<text x="${ax+apPx/2}" y="${ay-3}" text-anchor="middle" font-size="8" fill="#1A3D2B" font-family="DM Sans,sans-serif">${ap}mm</text>`;
  const wx=10+apPx;
  svg+=`<line x1="${wx}" y1="${ay}" x2="${wx+wdPx}" y2="${ay}" stroke="#8B6914" stroke-width="1"/>`;
  svg+=`<line x1="${wx}" y1="${ay-3}" x2="${wx}" y2="${ay+3}" stroke="#8B6914" stroke-width="1"/>`;
  svg+=`<line x1="${wx+wdPx}" y1="${ay-3}" x2="${wx+wdPx}" y2="${ay+3}" stroke="#8B6914" stroke-width="1"/>`;
  svg+=`<text x="${wx+wdPx/2}" y="${ay-3}" text-anchor="middle" font-size="8" fill="#8B6914" font-family="DM Sans,sans-serif">${wd}mm</text>`;
  return svg+'</svg>';
}

    lines+=`Item ${i+1}: ${it.moc} | ${it.weave} | ${it.aperture}×${it.wiredia}mm | ${it.width}×${it.length}mm | Qty:${it.qty}pcs | ~${it.wt_pc}kg/pc\n`;
  });
  lines+=`\nPlease send quotation.`;
  window.open(`https://wa.me/${HMB_WA}?text=${encodeURIComponent(lines)}`,'_blank');
}
</script>
